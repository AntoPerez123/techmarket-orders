name: Deploy Template v1.0.0

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: ${{ inputs.environment }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Iniciar despliegue Blue-Green
        run: |
          echo "Iniciando estrategia Blue-Green"

      - name: Desplegar nueva versión Green
        run: |
          echo "Desplegando versión GREEN del microservicio Orders"

      - name: Verificación post-deploy
        run: |
          echo "Validando disponibilidad y salud del servicio"

      - name: Cambiar tráfico hacia GREEN
        run: |
          echo "Redirigiendo tráfico hacia nueva versión"

      - name: Rollback automático en caso de error
        run: |
          echo "Rollback disponible hacia entorno BLUE"

      - name: Deploy finalizado
        run: |
          echo "Despliegue completado exitosamente en $ENVIRONMENT"