name: Template Build Docker

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string

jobs:
  build:
    name: Build imagen Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Verificar archivos de la aplicación
        run: |
          ls -la
          ls -la app
          test -f app/Dockerfile
          test -f app/package.json
          test -f app/src/server.js

      - name: Construir imagen Docker
        run: |
          docker build -t ${{ inputs.image_name }}:${{ inputs.image_tag }} ./app

      - name: Verificar imagen construida
        run: |
          docker images | grep ${{ inputs.image_name }}