name: Template Build Docker ECR

on:
  workflow_call:
    inputs:
      ecr_repository:
        required: true
        type: string
      image_tag:
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_SESSION_TOKEN:
        required: true
      AWS_REGION:
        required: true

jobs:
  build:
    name: Build y push imagen Docker a ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Verificar archivos de la aplicación
        run: |
          ls -la
          ls -la app
          test -f app/Dockerfile
          test -f app/package.json
          test -f app/src/server.js

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir URI de imagen
        run: |
          echo "IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr_repository }}:${{ inputs.image_tag }}" >> $GITHUB_ENV

      - name: Construir imagen Docker
        run: |
          docker build -t $IMAGE_URI ./app

      - name: Push imagen a ECR
        run: |
          docker push $IMAGE_URI

      - name: Confirmar imagen publicada
        run: |
          echo "Imagen publicada en ECR:"
          echo "$IMAGE_URI"