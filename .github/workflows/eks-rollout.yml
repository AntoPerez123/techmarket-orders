name: Despliegue EKS - Estrategias de Rollout

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: "Estrategia a ejecutar"
        required: true
        default: "rolling-update"
        type: choice
        options:
          - rolling-update
          - recreate
          - blue-green
          - canary

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Configurar acceso al cluster EKS
        run: |
          aws eks update-kubeconfig --region us-east-1 --name software-eks-cluster-cli

      - name: Verificar nodos del cluster
        run: |
          kubectl get nodes

      - name: Ejecutar Rolling Update
        if: ${{ github.event.inputs.strategy == 'rolling-update' }}
        run: |
          echo "Ejecutando estrategia Rolling Update"
          kubectl apply -f k8s/rolling-update.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/techmarket-rolling
          kubectl get pods
          kubectl get svc

      - name: Ejecutar Recreate
        if: ${{ github.event.inputs.strategy == 'recreate' }}
        run: |
          echo "Ejecutando estrategia Recreate"
          kubectl apply -f k8s/recreate.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/techmarket-recreate
          kubectl get pods
          kubectl get svc

      - name: Ejecutar Blue Green
        if: ${{ github.event.inputs.strategy == 'blue-green' }}
        run: |
          echo "Ejecutando estrategia Blue/Green"
          kubectl apply -f k8s/blue-green.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/orders-blue
          kubectl get pods
          kubectl get svc

      - name: Ejecutar Canary
        if: ${{ github.event.inputs.strategy == 'canary' }}
        run: |
          echo "Ejecutando estrategia Canary"
          kubectl apply -f k8s/canary.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/techmarket-canary
          kubectl get pods
          kubectl get svc

      - name: Verificación post-deploy
        run: |
          echo "Verificación final del estado del despliegue"
          kubectl get deployments
          kubectl get pods
          kubectl get svc