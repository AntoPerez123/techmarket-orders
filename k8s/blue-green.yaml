apiVersion: apps/v1
kind: Deployment

metadata:
  name: orders-blue

spec:
  replicas: 2

  selector:
    matchLabels:
      app: techmarket-orders
      version: blue

  template:
    metadata:
      labels:
        app: techmarket-orders
        version: blue

    spec:
      containers:
      - name: orders-container
        image: nginx:1.25

        ports:
        - containerPort: 80

---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: orders-green

spec:
  replicas: 2

  selector:
    matchLabels:
      app: techmarket-orders
      version: green

  template:
    metadata:
      labels:
        app: techmarket-orders
        version: green

    spec:
      containers:
      - name: orders-container
        image: nginx:1.25

        ports:
        - containerPort: 80