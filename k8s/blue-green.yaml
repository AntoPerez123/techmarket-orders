apiVersion: apps/v1
kind: Deployment
metadata:
  name: techmarket-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: techmarket
      version: blue
  template:
    metadata:
      labels:
        app: techmarket
        version: blue
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80