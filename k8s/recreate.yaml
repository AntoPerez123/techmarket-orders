apiVersion: apps/v1
kind: Deployment
metadata:
  name: techmarket-recreate
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: techmarket
  template:
    metadata:
      labels:
        app: techmarket
        version: v1
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80